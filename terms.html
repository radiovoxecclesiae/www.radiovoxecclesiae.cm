<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#011449">
  <meta name="robots" content="noindex, follow">

  <link rel="canonical" href="https://radiovoxecclesiae.cm/terms.html">
  <link rel="icon" type="image/x-icon" href="./images/favicon.ico">
  <link rel="icon" type="image/png" sizes="96x96" href="./images/favicon-96x96.png">
  <link rel="icon" type="image/svg+xml" href="./images/favicon.svg">
  <link rel="apple-touch-icon" sizes="192x192" href="./images/icon-192.png">
  <link rel="manifest" href="./site.webmanifest">

  <title data-i18n-title="termsPageTitle">Conditions d'utilisation — Radio Vox Ecclesiae</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=DM+Sans:wght@400;500&display=swap">

  <style>
    /* =========================================================
       Brand Palette — même variables que index.html
       ========================================================= */
    :root {
      --brand-primary: #011449;
      --brand-primary-container: #1A2A5E;
      --brand-secondary-container: #FDC656;
      --brand-icon: #C8972A;
      --brand-on-primary: #FFFFFF;
      --surface-card: rgba(255, 255, 255, 0.05);
      --surface-card-border: rgba(255, 255, 255, 0.1);
      --text-muted: rgba(255, 255, 255, 0.7);
      --font-heading: 'Noto Serif', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --space-xs: 0.5rem;
      --space-sm: 1rem;
      --space-md: 1.5rem;
      --space-lg: 2rem;
      --space-xl: 3rem;
      --container-max: 800px;
      --gutter: 24px;
      --transition-fast: 150ms ease;
      --transition-base: 250ms ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      font-size: 1rem;
      line-height: 1.7;
      color: var(--brand-on-primary);
      background: linear-gradient(180deg, var(--brand-primary) 0%, var(--brand-primary-container) 100%);
      background-attachment: fixed;
      min-height: 100vh;
    }

    img { max-width: 100%; display: block; }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: inherit; border: none; background: none; }

    /* Skip link */
    .skip-link {
      position: absolute; left: -9999px; top: var(--space-xs); z-index: 200;
      padding: 0.5rem 1rem; background: var(--brand-secondary-container);
      color: var(--brand-primary); font-weight: 500; font-size: 0.875rem;
      border-radius: 4px; text-decoration: none;
    }
    .skip-link:focus { left: var(--space-sm); }

    /* Container */
    .container {
      width: 100%; max-width: var(--container-max);
      margin-inline: auto; padding-inline: var(--gutter);
    }

    /* Header */
    #site-header {
      position: sticky; top: 0; z-index: 100;
      background: var(--brand-primary);
      border-bottom: 1px solid var(--surface-card-border);
      box-shadow: 0 2px 16px rgba(0,0,0,0.3);
    }
    .header__inner {
      display: flex; align-items: center; justify-content: space-between;
      gap: var(--space-sm); padding-block: var(--space-sm);
    }
    .header__brand { display: flex; align-items: center; gap: var(--space-xs); min-width: 0; }
    .header__logo { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .header__station-name {
      font-family: var(--font-heading); font-size: 1rem; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #lang-toggle {
      flex-shrink: 0; padding: 0.375rem 0.875rem;
      border: 1.5px solid var(--brand-secondary-container); border-radius: 999px;
      background: transparent; color: var(--brand-secondary-container);
      font-size: 0.875rem; font-weight: 500; letter-spacing: 0.05em;
      transition: background var(--transition-fast), color var(--transition-fast);
    }
    #lang-toggle:hover { background: var(--brand-secondary-container); color: var(--brand-primary); }
    #lang-toggle:focus-visible { outline: 2px solid var(--brand-secondary-container); outline-offset: 3px; }

    /* Main content */
    main { padding-block: var(--space-xl); }

    .legal-page__header {
      margin-bottom: var(--space-lg);
      padding-bottom: var(--space-md);
      border-bottom: 1px solid var(--surface-card-border);
    }
    .legal-page__header h1 {
      font-family: var(--font-heading); font-size: 2rem; font-weight: 700;
      line-height: 1.2; margin-bottom: var(--space-xs);
    }
    .legal-page__date { font-size: 0.875rem; color: var(--text-muted); }

    .legal-section { margin-bottom: var(--space-lg); }
    .legal-section h2 {
      font-family: var(--font-heading); font-size: 1.25rem; font-weight: 700;
      color: var(--brand-secondary-container); margin-bottom: var(--space-sm);
    }
    .legal-section p { color: var(--text-muted); margin-bottom: var(--space-sm); }
    .legal-section p:last-child { margin-bottom: 0; }
    .legal-section a {
      color: var(--brand-secondary-container); text-decoration: underline;
      text-underline-offset: 2px;
    }
    .legal-section a:focus-visible { outline: 2px solid var(--brand-secondary-container); outline-offset: 2px; border-radius: 2px; }

/* Footer */
    #site-footer {
      background: rgba(0,0,0,0.25); border-top: 1px solid var(--surface-card-border);
      padding-block: var(--space-md); text-align: center;
    }
    .footer__inner {
      display: flex; flex-direction: column; align-items: center; gap: var(--space-xs);
    }
    .footer__copyright { font-size: 0.875rem; color: var(--text-muted); }
    .footer__links { display: flex; gap: var(--space-md); }
    .footer__link {
      font-size: 0.875rem; color: var(--text-muted); transition: color var(--transition-fast);
    }
    .footer__link:hover { color: var(--brand-secondary-container); }
    .footer__link:focus-visible {
      outline: 2px solid var(--brand-secondary-container); outline-offset: 2px; border-radius: 2px;
    }

    /* i18n crossfade */
    [data-i18n] { transition: opacity var(--transition-base); }
    body.lang-switching [data-i18n] { opacity: 0; }

    @media (min-width: 768px) {
      .footer__inner { flex-direction: row; justify-content: space-between; }
      .legal-page__header h1 { font-size: 2.5rem; }
    }
  </style>
</head>

<body>

  <a href="#main-content" class="skip-link">Passer au contenu principal</a>

  <header id="site-header">
    <div class="container header__inner">
      <div class="header__brand">
        <img id="site-logo-header" class="header__logo" alt="Logo Radio Vox Ecclesiae" width="40" height="40">
        <span class="header__station-name">Radio Vox Ecclesiae</span>
      </div>
      <button id="lang-toggle" aria-label="Passer en anglais">EN</button>
    </div>
  </header>

  <main id="main-content">
    <div class="container">

<div class="legal-page__header">
        <h1 data-i18n="termsTitle"></h1>
        <p class="legal-page__date" data-i18n="termsDate"></p>
      </div>

      <!-- Section 1 — Acceptation -->
      <div class="legal-section">
        <h2 data-i18n="termsSec1Title"></h2>
        <p data-i18n="termsSec1Body"></p>
      </div>

      <!-- Section 2 — Description du service -->
      <div class="legal-section">
        <h2 data-i18n="termsSec2Title"></h2>
        <p data-i18n="termsSec2Body"></p>
      </div>

      <!-- Section 3 — Propriété intellectuelle -->
      <div class="legal-section">
        <h2 data-i18n="termsSec3Title"></h2>
        <p data-i18n="termsSec3Body"></p>
      </div>

      <!-- Section 4 — Limitation de responsabilité -->
      <div class="legal-section">
        <h2 data-i18n="termsSec4Title"></h2>
        <p data-i18n="termsSec4Body"></p>
      </div>

      <!-- Section 5 — Droit applicable -->
      <div class="legal-section">
        <h2 data-i18n="termsSec5Title"></h2>
        <p data-i18n="termsSec5Body"></p>
        <p>
          <a id="terms-contact-email" href=""></a>
        </p>
      </div>

    </div>
  </main>

  <footer id="site-footer">
    <div class="container footer__inner">
      <p class="footer__copyright">
        © <span id="footer-year"></span> <span data-i18n="footerCopyrightPrefix"></span>
      </p>
      <nav class="footer__links" aria-label="Liens légaux">
        <a id="footer-privacy-link" class="footer__link" href="./privacy.html" data-i18n="footerPrivacy"></a>
        <a id="footer-terms-link" class="footer__link" href="./terms.html" data-i18n="footerTerms"></a>
      </nav>
    </div>
  </footer>

  <script>
    'use strict';

    var IS_DEV = location.hostname === 'localhost' || location.hostname === '127.0.0.1';

    const CONFIG = {
      station: {
        name: 'Radio Vox Ecclesiae',
        logoUrl: './images/logo.png',
        canonicalUrl: 'https://radiovoxecclesiae.cm/',
      },
      contact: {
        email: 'radiovoxecclesiae@gmail.com',
      },
      links: {
        privacy: './privacy.html',
        terms: './terms.html',
      },
      i18n: {
        fr: {
          langToggleLabel: 'Passer en anglais',
          langToggleText: 'EN',
          termsPageTitle: 'Conditions d\'utilisation — Radio Vox Ecclesiae',
          termsTitle: 'Conditions d\'utilisation',
          termsDate: 'Dernière mise à jour : janvier 2024',
          termsSec1Title: 'Acceptation des conditions',
          termsSec1Body: 'En accédant à notre site web ou en utilisant notre application mobile, vous acceptez d\'être lié par les présentes conditions d\'utilisation. Si vous n\'acceptez pas ces conditions, veuillez ne pas utiliser nos services.',
          termsSec2Title: 'Description du service',
          termsSec2Body: 'Radio Vox Ecclesiae est une station de radio catholique du Diocèse de Bafoussam (Cameroun) diffusant sur les fréquences FM 97.3, 103.7 et 105.8. Nous proposons une écoute en direct via notre application mobile et notre site web, ainsi que du contenu éducatif et religieux.',
          termsSec3Title: 'Propriété intellectuelle',
          termsSec3Body: 'Tous les contenus diffusés par Radio Vox Ecclesiae — émissions, musiques, textes, logos et enregistrements — sont la propriété de Radio Vox Ecclesiae ou de ses concédants de licence. Toute reproduction, distribution ou utilisation non autorisée est strictement interdite sans accord écrit préalable.',
          termsSec4Title: 'Limitation de responsabilité',
          termsSec4Body: 'Radio Vox Ecclesiae s\'efforce d\'assurer la disponibilité continue de ses services, mais ne saurait être tenue responsable des interruptions de service, des erreurs techniques ou des dommages indirects résultant de l\'utilisation de ses services. Le service est fourni "en l\'état", sans garantie d\'aucune sorte.',
          termsSec5Title: 'Droit applicable et contact',
          termsSec5Body: 'Les présentes conditions sont régies par le droit camerounais. Tout litige sera soumis à la juridiction compétente de Bafoussam, Cameroun. Pour toute question, contactez-nous à :',
          footerCopyrightPrefix: 'Radio Vox Ecclesiae. Tous droits réservés.',
          footerPrivacy: 'Politique de confidentialité',
          footerTerms: 'Conditions d\'utilisation',
        },
        en: {
          langToggleLabel: 'Switch to French',
          langToggleText: 'FR',
          termsPageTitle: 'Terms of Service — Radio Vox Ecclesiae',
          termsTitle: 'Terms of Service',
          termsDate: 'Last updated: January 2024',
          termsSec1Title: 'Acceptance of Terms',
          termsSec1Body: 'By accessing our website or using our mobile application, you agree to be bound by these Terms of Service. If you do not accept these terms, please do not use our services.',
          termsSec2Title: 'Service Description',
          termsSec2Body: 'Radio Vox Ecclesiae is a Catholic radio station of the Diocese of Bafoussam (Cameroon) broadcasting on FM frequencies 97.3, 103.7 and 105.8. We offer live streaming via our mobile app and website, along with educational and religious content.',
          termsSec3Title: 'Intellectual Property',
          termsSec3Body: 'All content broadcast by Radio Vox Ecclesiae — programmes, music, texts, logos and recordings — is the property of Radio Vox Ecclesiae or its licensors. Any unauthorised reproduction, distribution or use is strictly prohibited without prior written consent.',
          termsSec4Title: 'Limitation of Liability',
          termsSec4Body: 'Radio Vox Ecclesiae strives to ensure the continuous availability of its services, but cannot be held liable for service interruptions, technical errors, or indirect damages arising from the use of its services. The service is provided "as is", without warranty of any kind.',
          termsSec5Title: 'Governing Law and Contact',
          termsSec5Body: 'These terms are governed by Cameroonian law. Any dispute shall be submitted to the competent jurisdiction of Bafoussam, Cameroon. For any questions, contact us at:',
          footerCopyrightPrefix: 'Radio Vox Ecclesiae. All rights reserved.',
          footerPrivacy: 'Privacy Policy',
          footerTerms: 'Terms of Service',
        },
      },
    };

    let currentLang = 'fr';

    function applyLang(lang) {
      if (!CONFIG.i18n[lang]) return;
      currentLang = lang;
      document.documentElement.setAttribute('lang', lang);

      var strings = CONFIG.i18n[lang];

      document.querySelectorAll('[data-i18n]').forEach(function (el) {
        var key = el.getAttribute('data-i18n');
        if (Object.prototype.hasOwnProperty.call(strings, key)) {
          el.textContent = strings[key];
        }
      });

      // Titre de la page
      document.title = strings.termsPageTitle;

      // Copyright année
      var yearEl = document.getElementById('footer-year');
      if (yearEl) yearEl.textContent = new Date().getFullYear();

      // Bouton toggle
      var toggleBtn = document.getElementById('lang-toggle');
      if (toggleBtn) {
        toggleBtn.textContent = strings.langToggleText;
        toggleBtn.setAttribute('aria-label', strings.langToggleLabel);
      }
    }

    function setLang(lang) {
      if (!CONFIG.i18n[lang]) return;
      document.body.classList.add('lang-switching');
      setTimeout(function () {
        applyLang(lang);
        document.body.classList.remove('lang-switching');
      }, 150);
    }

    function initLogos() {
      var logo = document.getElementById('site-logo-header');
      if (!logo) return;
      logo.src = CONFIG.station.logoUrl;
      logo.addEventListener('error', function () {
        this.style.display = 'none';
        if (IS_DEV) console.error('[logo] Échec du chargement :', this.src);
      });
    }

    function initLinks() {
      var emailLink = document.getElementById('terms-contact-email');
      if (emailLink) {
        emailLink.href = 'mailto:' + CONFIG.contact.email;
        emailLink.textContent = CONFIG.contact.email;
      }

      var privacyLink = document.getElementById('footer-privacy-link');
      if (privacyLink) privacyLink.href = CONFIG.links.privacy;

      var termsLink = document.getElementById('footer-terms-link');
      if (termsLink) termsLink.href = CONFIG.links.terms;
    }

    var langToggleBtn = document.getElementById('lang-toggle');
    if (langToggleBtn) {
      langToggleBtn.addEventListener('click', function () {
        setLang(currentLang === 'fr' ? 'en' : 'fr');
      });
    }

    initLogos();
    initLinks();
    applyLang('fr');
  </script>

</body>
</html>
