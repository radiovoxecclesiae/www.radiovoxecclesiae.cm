<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#011449">
  <meta name="description" content="Soutenez Radio Vox Ecclesiae — la radio catholique du Diocèse de Bafoussam. Vos dons nous permettent de continuer à diffuser la Parole de Dieu.">

  <link rel="icon" type="image/svg+xml" href="./images/favicon.svg">
  <link rel="icon" type="image/png" sizes="96x96" href="./images/favicon-96x96.png">
  <link rel="apple-touch-icon" sizes="192x192" href="./images/icon-192.png">
  <link rel="icon" type="image/x-icon" href="./images/favicon.ico">

  <title>Nous soutenir — Radio Vox Ecclesiae</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /* =========================================================
       Variables — identiques à index.html
       ========================================================= */
    :root {
      --brand-primary: #011449;
      --brand-primary-container: #1A2A5E;
      --brand-secondary-container: #FDC656;
      --brand-icon: #C8972A;
      --brand-on-primary: #FFFFFF;
      --surface-card: rgba(255, 255, 255, 0.07);
      --surface-card-border: rgba(255, 255, 255, 0.12);
      --surface-card-hover: rgba(255, 255, 255, 0.12);
      --text-muted: rgba(255, 255, 255, 0.65);
      --brand-secondary-glow: rgba(253, 198, 86, 0.3);
      --shadow-elevation: rgba(0, 0, 0, 0.4);
      --font-heading: 'Noto Serif', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --space-xs: 0.5rem;
      --space-sm: 1rem;
      --space-md: 1.5rem;
      --space-lg: 2rem;
      --space-xl: 3rem;
      --container-max: 960px;
      --gutter: 24px;
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --radius-full: 999px;
      --transition-fast: 150ms ease;
      --transition-base: 250ms ease;
      --transition-spring: 300ms cubic-bezier(0.34, 1.56, 0.64, 1);
      --safe-area-bottom: env(safe-area-inset-bottom, 0px);
      --header-h: 64px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { overflow-x: hidden; height: 100%; }

    body {
      font-family: var(--font-body);
      font-size: 1rem;
      line-height: 1.6;
      color: var(--brand-on-primary);
      background-color: var(--brand-primary);
      background-image: url('./images/support-us.jpeg');
      background-size: cover;
      background-position: center top;
      background-attachment: fixed;
      min-height: 100%;
      overflow-x: hidden;
    }

    @supports (-webkit-touch-callout: none) {
      body { background-attachment: scroll; }
    }

    /* lang-switching fade — identique à index.html */
    body.lang-switching { opacity: 0; transition: opacity 150ms ease; }

    /* Overlay dense — image très légèrement visible */
    main {
      background: linear-gradient(180deg, rgba(1, 20, 73, 0.97) 0%, rgba(26, 42, 94, 0.97) 100%);
    }

    img { max-width: 100%; display: block; }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: inherit; border: none; background: none; }

    /* =========================================================
       Header — copie exacte de index.html
       ========================================================= */
    #site-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-h);
      z-index: 200;
      background: rgba(1, 20, 73, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--surface-card-border);
    }

    .header__inner {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-sm);
    }

    .header__brand {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
      min-width: 0;
    }

    .header__logo {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .header__station-name {
      font-family: var(--font-heading);
      font-size: 1rem;
      font-weight: 700;
      color: var(--brand-on-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Bouton toggle Fr/En — copie exacte de index.html */
    #lang-toggle {
      flex-shrink: 0;
      padding: 0.35rem 0.85rem;
      border: 1.5px solid var(--brand-secondary-container);
      border-radius: var(--radius-full);
      background: transparent;
      color: var(--brand-secondary-container);
      font-family: var(--font-body);
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      transition: background var(--transition-fast), color var(--transition-fast), transform var(--transition-spring);
    }

    #lang-toggle:hover {
      background: var(--brand-secondary-container);
      color: var(--brand-primary);
      transform: scale(1.05);
    }

    #lang-toggle:active { transform: scale(0.97); }

    #lang-toggle:focus-visible {
      outline: 2px solid var(--brand-secondary-container);
      outline-offset: 3px;
    }

    /* =========================================================
       Layout
       ========================================================= */
    .container {
      width: 100%;
      max-width: var(--container-max);
      margin-inline: auto;
      padding-inline: var(--gutter);
    }

    main {
      padding-top: calc(var(--header-h) + var(--space-xl));
      padding-bottom: calc(var(--space-xl) + var(--safe-area-bottom));
    }

    .support-wrap {
      max-width: 560px;
      margin-inline: auto;
    }

    /* =========================================================
       Hero
       ========================================================= */
    .support-hero {
      text-align: center;
      margin-bottom: var(--space-xl);
    }

    .support-hero__icon {
      width: 72px;
      height: 72px;
      margin-inline: auto;
      margin-bottom: var(--space-md);
      background: rgba(253, 198, 86, 0.12);
      border: 1.5px solid rgba(253, 198, 86, 0.3);
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .support-hero__icon svg {
      width: 36px;
      height: 36px;
      fill: var(--brand-secondary-container);
    }

    .support-hero__title {
      font-family: var(--font-heading);
      font-size: clamp(1.75rem, 6vw, 2.5rem);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: var(--space-sm);
    }

    .support-hero__subtitle {
      font-size: 1rem;
      color: var(--text-muted);
      line-height: 1.7;
    }

    /* =========================================================
       Encart info
       ========================================================= */
    .intention-box {
      background: rgba(253, 198, 86, 0.06);
      border: 1px solid rgba(253, 198, 86, 0.2);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      margin-bottom: var(--space-xl);
      display: flex;
      gap: var(--space-sm);
      align-items: flex-start;
    }

    .intention-box__icon {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      background: rgba(253, 198, 86, 0.1);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .intention-box__icon svg {
      width: 18px;
      height: 18px;
      fill: var(--brand-secondary-container);
    }

    .intention-box__text {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .intention-box__text strong {
      color: var(--brand-on-primary);
      font-weight: 600;
    }

    /* =========================================================
       Carte de paiement
       ========================================================= */
    .payment-card {
      background: rgba(18, 28, 68, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: 0 40px 40px rgba(1, 9, 51, 0.25);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      margin-bottom: var(--space-xl);
    }

    .payment-card__header {
      padding: var(--space-md) var(--space-md) var(--space-sm);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .payment-card__title {
      font-family: var(--font-heading);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--brand-on-primary);
      margin-bottom: 0.35rem;
      line-height: 1.2;
    }

    .payment-card__subtitle {
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .payment-card__providers {
      padding: var(--space-md);
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }

    .provider-btn {
      width: 100%;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: filter var(--transition-base), transform var(--transition-spring);
      overflow: hidden;
    }

    .provider-btn:hover  { filter: brightness(1.07); }
    .provider-btn:active { transform: scale(0.98); }

    .provider-btn__inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
    }

    .provider-btn__left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-align: left;
    }

    .provider-btn__icon {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.12);
    }

    .provider-btn__icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .provider-btn__label {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.1;
    }

    .provider-btn__number {
      font-size: 0.75rem;
      font-weight: 500;
      opacity: 0.75;
      letter-spacing: 0.02em;
      margin-top: 0.1rem;
    }

    .provider-btn__arrow {
      font-size: 1.25rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .provider-btn--mtn .provider-btn__inner { background: #FFCC00; }
    .provider-btn--mtn .provider-btn__label,
    .provider-btn--mtn .provider-btn__number,
    .provider-btn--mtn .provider-btn__arrow { color: #1A1200; }

    .provider-btn--orange .provider-btn__inner { background: #FF7000; }
    .provider-btn--orange .provider-btn__label,
    .provider-btn--orange .provider-btn__number,
    .provider-btn--orange .provider-btn__arrow { color: #fff; }

    .provider-hint {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 0.25rem 0;
      margin-bottom: 0.25rem;
    }

    .provider-hint__dot {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-full);
      background: rgba(255, 255, 255, 0.07);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .provider-hint__dot svg { width: 18px; height: 18px; }

    .provider-hint__overline {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 700;
      color: var(--text-muted);
      line-height: 1;
      margin-bottom: 0.15rem;
    }

    .provider-hint__value {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--brand-on-primary);
      line-height: 1;
    }

    .payment-card__footer {
      padding: var(--space-xs) var(--space-md) var(--space-md);
      display: flex;
      justify-content: center;
    }

    .security-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius-full);
      padding: 0.4rem 0.9rem;
    }

    .security-badge svg {
      width: 14px;
      height: 14px;
      fill: var(--brand-secondary-container);
      flex-shrink: 0;
    }

    .security-badge__text {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.03em;
    }

    /* =========================================================
       Toast
       ========================================================= */
    .toast {
      position: fixed;
      bottom: calc(var(--space-lg) + var(--safe-area-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: rgba(30, 50, 100, 0.95);
      border: 1px solid rgba(253, 198, 86, 0.3);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      color: var(--brand-on-primary);
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.6rem 1.25rem;
      border-radius: var(--radius-full);
      opacity: 0;
      transition: opacity 250ms ease, transform 250ms ease;
      pointer-events: none;
      white-space: nowrap;
      z-index: 300;
    }

    .toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* =========================================================
       Footer — identique à index.html
       ========================================================= */
    #site-footer {
      background: rgba(0, 0, 0, 0.7);
      border-top: 1px solid var(--surface-card-border);
      padding-block: var(--space-md);
      padding-bottom: calc(var(--space-md) + var(--safe-area-bottom));
      text-align: center;
    }

    .footer__inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-xs);
    }

    .footer__copyright {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .footer__links {
      display: flex;
      gap: var(--space-md);
    }

    .footer__link {
      font-size: 0.875rem;
      color: var(--text-muted);
      transition: color var(--transition-fast);
    }

    .footer__link:hover { color: var(--brand-secondary-container); }

    .footer__link:focus-visible {
      outline: 2px solid var(--brand-secondary-container);
      outline-offset: 2px;
      border-radius: 2px;
    }

    @media (min-width: 768px) {
      .footer__inner {
        flex-direction: row;
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>

  <!-- ============================================================
       HEADER — copie exacte de index.html
       ============================================================ -->
  <header id="site-header">
    <div class="container header__inner">
      <a href="/" class="header__brand">
        <img
          id="site-logo-header"
          class="header__logo"
          alt="Logo Radio Vox Ecclesiae"
          width="40"
          height="40"
        >
        <span class="header__station-name">Radio Vox Ecclesiae</span>
      </a>

      <button
        id="lang-toggle"
        title="Changer de langue / Switch language"
      ></button>
    </div>
  </header>

  <!-- Toast -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <main>
    <div class="container">
      <div class="support-wrap">

        <!-- Hero -->
        <div class="support-hero">
          <div class="support-hero__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
          </div>
          <h1 class="support-hero__title" data-i18n="supportTitle"></h1>
          <p class="support-hero__subtitle" data-i18n="supportSubtitle"></p>
        </div>

        <!-- Encart info -->
        <div class="intention-box">
          <div class="intention-box__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M11 17h2v-6h-2v6zm1-15C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zM11 9h2V7h-2v2z"/>
            </svg>
          </div>
          <p class="intention-box__text">
            <strong data-i18n="supportHowTitle"></strong><br>
            <span data-i18n="supportHowBody"></span>
          </p>
        </div>

        <!-- Carte de paiement -->
        <div class="payment-card">

          <div class="payment-card__header">
            <h2 class="payment-card__title" data-i18n="supportPaymentTitle"></h2>
            <p class="payment-card__subtitle" data-i18n="supportPaymentSubtitle"></p>
          </div>

          <div class="payment-card__providers">

            <!-- MTN -->
            <div>
              <button
                class="provider-btn provider-btn--mtn"
                onclick="copyNumber('237653171211')"
                data-i18n-aria="supportMtnAriaLabel"
              >
                <div class="provider-btn__inner">
                  <div class="provider-btn__left">
                    <div class="provider-btn__icon">
                      <img src="./images/mtn-momo.png" alt="MTN Mobile Money">
                    </div>
                    <div>
                      <div class="provider-btn__label" data-i18n="supportMtnCta"></div>
                      <div class="provider-btn__number">+237 6 53 17 12 11</div>
                    </div>
                  </div>
                  <span class="provider-btn__arrow">→</span>
                </div>
              </button>
              <div class="provider-hint">
                <div class="provider-hint__dot">
                  <svg viewBox="0 0 24 24" aria-hidden="true" fill="rgba(255,204,0,0.8)">
                    <path d="M17 1.01 7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/>
                  </svg>
                </div>
                <div>
                  <p class="provider-hint__overline" data-i18n="supportReceiptLabel"></p>
                  <p class="provider-hint__value">+237 6 53 17 12 11</p>
                </div>
              </div>
            </div>

            <!-- Orange -->
            <div>
              <button
                class="provider-btn provider-btn--orange"
                onclick="copyNumber('237690060301')"
                data-i18n-aria="supportOrangeAriaLabel"
              >
                <div class="provider-btn__inner">
                  <div class="provider-btn__left">
                    <div class="provider-btn__icon">
                      <img src="./images/orange-om.png" alt="Orange Money">
                    </div>
                    <div>
                      <div class="provider-btn__label" data-i18n="supportOrangeCta"></div>
                      <div class="provider-btn__number">+237 6 90 06 03 01</div>
                    </div>
                  </div>
                  <span class="provider-btn__arrow">→</span>
                </div>
              </button>
              <div class="provider-hint">
                <div class="provider-hint__dot">
                  <svg viewBox="0 0 24 24" aria-hidden="true" fill="rgba(255,112,0,0.8)">
                    <path d="M17 1.01 7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/>
                  </svg>
                </div>
                <div>
                  <p class="provider-hint__overline" data-i18n="supportReceiptLabel"></p>
                  <p class="provider-hint__value">+237 6 90 06 03 01</p>
                </div>
              </div>
            </div>

          </div>

          <div class="payment-card__footer">
            <div class="security-badge">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/>
              </svg>
              <span class="security-badge__text" data-i18n="supportSecurityNote"></span>
            </div>
          </div>

        </div>

      </div>
    </div>
  </main>

  <footer id="site-footer">
    <div class="container footer__inner">
      <p class="footer__copyright">
        © <span id="footer-year"></span> <span data-i18n="footerCopyrightPrefix"></span>
      </p>
      <nav class="footer__links" aria-label="Liens légaux">
        <a id="footer-privacy-link" class="footer__link" href="./privacy.html" data-i18n="footerPrivacy"></a>
        <a id="footer-terms-link"   class="footer__link" href="./terms.html"   data-i18n="footerTerms"></a>
      </nav>
    </div>
  </footer>

        supportMtnCta:       'Pay with MTN',

        supportOrangeCta:       'Pay with Orange',

        supportReceiptLabel: 'Receiving number',
        supportSecurityNote: 'Tap to copy the number',

        toastCopied: 'Number copied!',

        footerCopyrightPrefix: 'Radio Vox Ecclesiae. All rights reserved.',
        footerPrivacy: 'Privacy Policy',
        footerTerms: 'Terms of Service',
      },
    };

    var currentLang = 'fr';

    /* ===========================================================
       applyLang — même logique que index.html
       =========================================================== */
    function applyLang(lang) {
      if (!i18n[lang]) return;
      currentLang = lang;
      document.documentElement.setAttribute('lang', lang);

      var strings = i18n[lang];

      document.querySelectorAll('[data-i18n]').forEach(function (el) {
        var key = el.getAttribute('data-i18n');
        if (Object.prototype.hasOwnProperty.call(strings, key)) {
          el.textContent = strings[key];
        }
      });

      document.querySelectorAll('[data-i18n-aria]').forEach(function (el) {
        var key = el.getAttribute('data-i18n-aria');
        if (Object.prototype.hasOwnProperty.call(strings, key)) {
          el.setAttribute('aria-label', strings[key]);
        }
      });

      var toggleBtn = document.getElementById('lang-toggle');
      if (toggleBtn) {
        toggleBtn.textContent = strings.langToggleText;
        toggleBtn.setAttribute('aria-label', strings.langToggleLabel);
      }

      var yearEl = document.getElementById('footer-year');
      if (yearEl) yearEl.textContent = new Date().getFullYear();
    }

    function setLang(lang) {
      if (!i18n[lang]) return;
      document.body.classList.add('lang-switching');
      setTimeout(function () {
        applyLang(lang);
        document.body.classList.remove('lang-switching');
      }, 150);
    }

    /* ===========================================================
       Logo
       =========================================================== */
    var logoEl = document.getElementById('site-logo-header');
    if (logoEl) logoEl.src = './images/logo.png';

    /* ===========================================================
       Lang toggle
       =========================================================== */
    var langToggleBtn = document.getElementById('lang-toggle');
    if (langToggleBtn) {
      langToggleBtn.addEventListener('click', function () {
        setLang(currentLang === 'fr' ? 'en' : 'fr');
      });
    }

    /* ===========================================================
       Toast + copie
       =========================================================== */
    var toastEl = document.getElementById('toast');
    var toastTimer;

    function copyNumber(number) {
      var strings = i18n[currentLang];
      navigator.clipboard.writeText('+' + number).then(function () {
        showToast(strings.toastCopied);
      }).catch(function () {
        var ta = document.createElement('textarea');
        ta.value = '+' + number;
        ta.style.cssText = 'position:fixed;opacity:0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast(strings.toastCopied);
      });
    }

    function showToast(msg) {
      if (!toastEl) return;
      toastEl.textContent = msg;
      toastEl.classList.add('visible');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function () {
        toastEl.classList.remove('visible');
      }, 2500);
    }

    /* ===========================================================
       Bootstrap
       =========================================================== */
    applyLang('fr');
  </script>

</body>
</html>
