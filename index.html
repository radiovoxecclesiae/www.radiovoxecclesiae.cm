  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=DM+Sans:wght@400;500&display=swap">

  <style>
    /* =========================================================
       CSS Custom Properties — Brand Palette
       ========================================================= */
    :root {
      /* Brand colors */
      --brand-primary: #011449;
      --brand-primary-container: #1A2A5E;
      --brand-secondary-container: #FDC656;
      --brand-icon: #C8972A;
      --brand-on-primary: #FFFFFF;

      /* Derived surfaces */
      --surface-card: rgba(255, 255, 255, 0.07);
      --surface-card-border: rgba(255, 255, 255, 0.12);
      --surface-card-hover: rgba(255, 255, 255, 0.12);
      --text-muted: rgba(255, 255, 255, 0.65);
      --brand-secondary-glow: rgba(253, 198, 86, 0.3);
      --shadow-elevation: rgba(0, 0, 0, 0.4);

      /* Typography */
      --font-heading: 'Noto Serif', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;

      /* Spacing scale */
      --space-xs: 0.5rem;
      --space-sm: 1rem;
      --space-md: 1.5rem;
      --space-lg: 2rem;
      --space-xl: 3rem;
      --space-2xl: 4rem;

      /* Layout */
      --container-max: 960px;
      --gutter: 24px;

      /* Border radius */
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --radius-full: 999px;

      /* Transitions */
      --transition-fast: 150ms ease;
      --transition-base: 250ms ease;
      --transition-spring: 300ms cubic-bezier(0.34, 1.56, 0.64, 1);

      /* Safe areas for sticky bottom bar */
      --safe-area-bottom: env(safe-area-inset-bottom, 0px);

      /* Snap scroll header height */
      --header-h: 64px;
    }

    /* =========================================================
       Reset minimal
       ========================================================= */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-snap-type: y mandatory;
      overflow-y: scroll;
      overflow-x: hidden;
      height: 100%;
    }

    body {
      font-family: var(--font-body);
      font-size: 1rem;
      line-height: 1.6;
      color: var(--brand-on-primary);
      background-color: var(--brand-primary);
      /* Image de fond globale — donne du matériau au glassmorphism */
      background-image: url('./images/radio-background.jpg');
      background-size: cover;
      background-position: center top;
      /* fixed crée un effet parallax sur desktop */
      background-attachment: fixed;
      min-height: 100%;
      overflow-x: hidden;
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      cursor: pointer;
      font-family: inherit;
      border: none;
      background: none;
    }

    /* =========================================================
       Skip to content — WCAG 2.4.1 niveau A
       ========================================================= */
    .skip-link {
      position: fixed;
      left: -9999px;
      top: var(--space-xs);
      z-index: 300;
      padding: 0.5rem 1rem;
      background: var(--brand-secondary-container);
      color: var(--brand-primary);
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 0.875rem;
      border-radius: 4px;
      text-decoration: none;
    }

    .skip-link:focus {
      left: var(--space-sm);
    }

    /* =========================================================
       Layout utilitaire
       ========================================================= */
    .container {
      width: 100%;
      max-width: var(--container-max);
      margin-inline: auto;
      padding-inline: var(--gutter);
    }

    /* =========================================================
       Animations — keyframes
       ========================================================= */
    @keyframes fade-slide-up {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse-ring {
      0%   { transform: scale(1); opacity: 0.7; }
      100% { transform: scale(1.9); opacity: 0; }
    }

    @keyframes live-blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    @keyframes eq-bar {
      0%, 100% { transform: scaleY(0.3); }
      50%       { transform: scaleY(1); }
    }

    /* Hero animated gradient */
    @keyframes gradient-shift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Scroll-triggered reveal */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .reveal-delay-1 { transition-delay: 80ms; }
    .reveal-delay-2 { transition-delay: 160ms; }
    .reveal-delay-3 { transition-delay: 240ms; }
    .reveal-delay-4 { transition-delay: 320ms; }

    /* =========================================================
       Header sticky — glassmorphism
       ========================================================= */
    #site-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-h);
      z-index: 200;
      background: rgba(1, 20, 73, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--surface-card-border);
    }

    .header__inner {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-sm);
    }

    .header__brand {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
      min-width: 0;
    }

    .header__logo {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .header__station-name {
      font-family: var(--font-heading);
      font-size: 1rem;
      font-weight: 700;
      color: var(--brand-on-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Bouton toggle Fr/En */
    #lang-toggle {
      flex-shrink: 0;
      padding: 0.35rem 0.85rem;
      border: 1.5px solid var(--brand-secondary-container);
      border-radius: var(--radius-full);
      background: transparent;
      color: var(--brand-secondary-container);
      font-family: var(--font-body);
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      transition: background var(--transition-fast), color var(--transition-fast), transform var(--transition-spring);
    }

    #lang-toggle:hover {
      background: var(--brand-secondary-container);
      color: var(--brand-primary);
      transform: scale(1.05);
    }

    #lang-toggle:active {
      transform: scale(0.97);
    }

    #lang-toggle:focus-visible {
      outline: 2px solid var(--brand-secondary-container);
      outline-offset: 3px;
    }

    /* =========================================================
       Scroll progress dots — right side navigation (desktop only)
       ========================================================= */
    #scroll-dots {
      position: fixed;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 150;
      display: none; /* hidden on mobile by default */
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }

    @media (min-width: 768px) {
      #scroll-dots {
        display: flex;
      }
    }

    .scroll-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      border: 1.5px solid rgba(255, 255, 255, 0.4);
      cursor: pointer;
      transition: background var(--transition-base), transform var(--transition-spring), border-color var(--transition-base);
      padding: 0;
    }

    .scroll-dot:hover {
      background: rgba(255, 255, 255, 0.6);
      transform: scale(1.3);
    }

    .scroll-dot.active {
      background: var(--brand-secondary-container);
      border-color: var(--brand-secondary-container);
      transform: scale(1.4);
    }

    .scroll-dot:focus-visible {
      outline: 2px solid var(--brand-secondary-container);
      outline-offset: 3px;
    }

    /* =========================================================
       Snap sections — full-height slides
       ========================================================= */
    .snap-section {
      scroll-snap-align: start;
      min-height: 100vh;           /* fallback */
      min-height: 100svh;          /* dynamic viewport — corrige le bug iOS barre d'adresse */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding-block: calc(var(--header-h) + var(--space-xl)) var(--space-xl);
      position: relative;
    }

    /* Last section extra padding for mobile sticky bar */
    .snap-section:last-of-type {
      padding-bottom: calc(var(--space-xl) + 80px + var(--safe-area-bottom));
    }

    .snap-section .container {
      width: 100%;
    }

    /* Utilitaire — remplace les style inline */
    .text-center {
      text-align: center;
    }

    .section__title {
      font-family: var(--font-heading);
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--brand-on-primary);
      margin-bottom: var(--space-md);
      text-align: center;
    }

    .section__desc {
      font-size: 1rem;
      color: var(--text-muted);
      line-height: 1.7;
      text-align: center;
      margin-bottom: var(--space-lg);
      max-width: 56ch;
      margin-inline: auto;
    }

    /* =========================================================
       Hero — fond transparent pour laisser l'image body respirer
       ========================================================= */
    #hero {
      background: linear-gradient(
        to bottom,
        rgba(1, 20, 73, 0.55) 0%,
        rgba(1, 20, 73, 0.75) 100%
      );
      text-align: center;
    }

    /* Vignette bas pour transition douce vers section suivante */
    #hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 120px;
      background: linear-gradient(to bottom, transparent, rgba(1, 20, 73, 0.9));
      pointer-events: none;
    }

    /* Suppression de la logo-wrap — logo uniquement dans le header */
    .hero__logo-wrap {
      display: none;
    }

    /* Surtitre catégorie au-dessus du titre principal */
    .hero__eyebrow {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--brand-secondary-container);
      margin-bottom: var(--space-sm);
      opacity: 0.9;
    }

    #hero-title {
      font-family: var(--font-heading);
      font-size: clamp(2.25rem, 8vw, 4.5rem);
      font-weight: 700;
      line-height: 1.15;
      color: var(--brand-on-primary);
      margin-bottom: var(--space-sm);
      text-shadow: 0 2px 24px rgba(0, 0, 0, 0.5);
    }

    .hero__diocese {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: var(--space-lg);
    }

    .hero__frequencies {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--space-xs);
    }

    .frequency-badge {
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 0.8rem;
      color: var(--brand-primary);
      background: var(--brand-secondary-container);
      padding: 0.3rem 0.85rem;
      border-radius: var(--radius-full);
      letter-spacing: 0.06em;
    }

    /* =========================================================
       Section Listen — LIVE indicator + equalizer + pulse CTA
       ========================================================= */
    #listen {
      background: linear-gradient(180deg, rgba(1, 20, 73, 0.82) 0%, rgba(10, 24, 48, 0.92) 100%);
      text-align: center;
    }

    /* LIVE badge */
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(220, 38, 38, 0.15);
      border: 1px solid rgba(220, 38, 38, 0.4);
      border-radius: var(--radius-full);
      padding: 0.25rem 0.75rem;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #f87171;
      text-transform: uppercase;
      margin-bottom: var(--space-md);
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ef4444;
      animation: live-blink 1.4s ease-in-out infinite;
      flex-shrink: 0;
    }

    /* CSS Equalizer */
    .equalizer {
      display: inline-flex;
      align-items: flex-end;
      gap: 3px;
      height: 20px;
      margin-bottom: var(--space-md);
    }

    .eq-bar {
      width: 4px;
      border-radius: 2px;
      background: var(--brand-secondary-container);
      transform-origin: bottom center;
    }

    /* Barres statiques par défaut — pas de stream actif dans la page */
    .eq-bar:nth-child(1) { height: 40%; }
    .eq-bar:nth-child(2) { height: 70%; }
    .eq-bar:nth-child(3) { height: 55%; }
    .eq-bar:nth-child(4) { height: 30%; }
    .eq-bar:nth-child(5) { height: 60%; }

    /* Animées uniquement si la radio joue réellement */
    .equalizer.playing .eq-bar:nth-child(1) { animation: eq-bar 0.9s ease-in-out infinite; animation-delay: 0s; }
    .equalizer.playing .eq-bar:nth-child(2) { animation: eq-bar 0.7s ease-in-out infinite; animation-delay: 0.15s; }
    .equalizer.playing .eq-bar:nth-child(3) { animation: eq-bar 1.1s ease-in-out infinite; animation-delay: 0.3s; }
    .equalizer.playing .eq-bar:nth-child(4) { animation: eq-bar 0.8s ease-in-out infinite; animation-delay: 0.1s; }
    .equalizer.playing .eq-bar:nth-child(5) { animation: eq-bar 1.0s ease-in-out infinite; animation-delay: 0.25s; }

    .listen__cta-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: var(--space-sm);
    }

    /* Pulse rings */
    .listen__cta-wrap::before,
    .listen__cta-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius-full);
      border: 2px solid var(--brand-secondary-container);
      animation: pulse-ring 2s ease-out infinite;
      pointer-events: none;
    }

    .listen__cta-wrap::after {
      animation-delay: 0.8s;
    }

    .listen__btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      padding: 1rem 2.25rem;
      background: var(--brand-secondary-container);
      color: var(--brand-primary);
      font-family: var(--font-body);
      font-size: 1.125rem;
      font-weight: 700;
      border-radius: var(--radius-full);
      border: none;
      text-decoration: none;
      transition: transform var(--transition-spring), box-shadow var(--transition-base);
      white-space: nowrap;
    }

    .listen__btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 12px 32px var(--brand-secondary-glow);
    }

    .listen__btn:active {
      transform: scale(0.97);
      box-shadow: none;
    }

    .listen__btn:focus-visible {
      outline: 2px solid var(--brand-secondary-container);
      outline-offset: 4px;
    }

    .listen__btn-icon {
      width: 20px;
      height: 20px;
      fill: var(--brand-primary);
      flex-shrink: 0;
    }

    /* =========================================================
       Section Download — store badges
       ========================================================= */
    #download {
      background: linear-gradient(180deg, rgba(10, 24, 48, 0.88) 0%, rgba(26, 42, 94, 0.92) 100%);
      text-align: center;
    }

    .download__badges {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: var(--space-sm);
      width: 100%;
      max-width: 320px;
      margin-inline: auto;
    }

    /* Device-aware priority badge */
    .store-badge {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.875rem 1.5rem;
      border: 1.5px solid var(--surface-card-border);
      border-radius: var(--radius-md);
      color: var(--brand-on-primary);
      background: var(--surface-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: background var(--transition-base), transform var(--transition-spring), box-shadow var(--transition-base), border-color var(--transition-base);
      text-align: left;
      text-decoration: none;
      width: 100%;
      box-sizing: border-box;
    }

    .store-badge:hover {
      background: var(--surface-card-hover);
      transform: translateY(-3px) scale(1.01);
      box-shadow: 0 8px 28px var(--shadow-elevation);
      border-color: rgba(253, 198, 86, 0.4);
    }

    .store-badge:active {
      transform: scale(0.98);
    }

    .store-badge:focus-visible {
      outline: 2px solid var(--brand-secondary-container);
      outline-offset: 3px;
    }

    /* Primary badge (device-detected) gets gold border highlight */
    .store-badge--primary {
      border-color: rgba(253, 198, 86, 0.5);
      background: rgba(253, 198, 86, 0.06);
    }

    .store-badge__icon {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
      fill: var(--brand-on-primary);
    }

    .store-badge__text {
      display: flex;
      flex-direction: column;
    }

    .store-badge__label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      line-height: 1;
    }

    .store-badge__name {
      font-size: 1.05rem;
      font-weight: 500;
      line-height: 1.3;
      color: var(--brand-on-primary);
    }

    /* =========================================================
       Section About — mission cards with glassmorphism
       ========================================================= */
    #about {
      background: linear-gradient(180deg, rgba(26, 42, 94, 0.88) 0%, rgba(1, 20, 73, 0.92) 100%);
    }

    .mission-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-sm);
      margin-top: var(--space-md);
    }

    .mission-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: var(--space-xs);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      transition: background var(--transition-base), transform var(--transition-spring), box-shadow var(--transition-base);
    }

    .mission-card:hover {
      background: rgba(255, 255, 255, 0.09);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .mission-card__icon {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-sm);
      background: var(--brand-secondary-glow);
      border: 1px solid rgba(253, 198, 86, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .mission-card__icon svg {
      width: 24px;
      height: 24px;
      fill: var(--brand-secondary-container);
    }

    .mission-card__title {
      font-family: var(--font-heading);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--brand-on-primary);
    }

    .mission-card__desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* =========================================================
       Section Contact — contact cards
       ========================================================= */
    #contact {
      background: linear-gradient(180deg, rgba(1, 20, 73, 0.88) 0%, rgba(7, 15, 43, 0.95) 100%);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: var(--space-sm);
      width: 100%;
      max-width: 640px;
      margin-inline: auto;
    }

    .contact-card {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      width: 100%;
      box-sizing: border-box;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--radius-md);
      padding: var(--space-sm) var(--space-md);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.06);
      transition: background var(--transition-base), transform var(--transition-spring), box-shadow var(--transition-base);
      text-decoration: none;
      color: var(--brand-on-primary);
    }

    .contact-card--link:hover {
      background: rgba(255, 255, 255, 0.09);
      transform: translateY(-3px);
      box-shadow: 0 10px 32px rgba(0, 0, 0, 0.3);
    }

    .contact-card--link:active {
      transform: scale(0.98);
    }

    .contact-card--link:focus-visible {
      outline: 2px solid var(--brand-secondary-container);
      outline-offset: 3px;
    }

    .contact-card__icon {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .contact-card__icon--whatsapp { background: rgba(37, 211, 102, 0.15); }
    .contact-card__icon--facebook { background: rgba(24, 119, 242, 0.15); }
    .contact-card__icon--email    { background: rgba(253, 198, 86, 0.15); }
    .contact-card__icon--address  { background: rgba(255, 255, 255, 0.08); }

    .contact-card__icon svg {
      width: 24px;
      height: 24px;
    }

    .contact-card__icon--whatsapp svg { fill: #25D366; }
    .contact-card__icon--facebook svg { fill: #1877F2; }
    .contact-card__icon--email    svg { fill: var(--brand-secondary-container); }
    .contact-card__icon--address  svg { fill: var(--text-muted); }

    .contact-card__body {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .contact-card__label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      line-height: 1;
    }

    .contact-card__value {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--brand-on-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* =========================================================
       Footer — snap scroll last slide
       ========================================================= */
    #site-footer {
      scroll-snap-align: start;
      min-height: 0;
      background: rgba(0, 0, 0, 0.7);
      border-top: 1px solid var(--surface-card-border);
      padding-block: var(--space-md);
      padding-bottom: calc(var(--space-md) + 72px + var(--safe-area-bottom));
      text-align: center;
    }

    .footer__inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-xs);
    }

    .footer__copyright {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .footer__links {
      display: flex;
      gap: var(--space-md);
    }

    .footer__link {
      font-size: 0.875rem;
      color: var(--text-muted);
      transition: color var(--transition-fast);
    }

    .footer__link:hover {
      color: var(--brand-secondary-container);
    }

    .footer__link:focus-visible {
      outline: 2px solid var(--brand-secondary-container);
      outline-offset: 2px;
      border-radius: 2px;
    }

    /* =========================================================
       Sticky bottom bar — mobile CTA (Listen + Download)
       ========================================================= */
    #sticky-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 150;
      background: rgba(1, 20, 73, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--surface-card-border);
      padding: 10px 16px;
      padding-bottom: calc(10px + var(--safe-area-bottom));
      display: flex;
      gap: 10px;
    }

    .sticky-bar__btn {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0.65rem 1rem;
      border-radius: var(--radius-full);
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 700;
      text-decoration: none;
      transition: transform var(--transition-spring), box-shadow var(--transition-base);
      white-space: nowrap;
    }

    .sticky-bar__btn:active {
      transform: scale(0.96);
    }

    .sticky-bar__btn--primary {
      background: var(--brand-secondary-container);
      color: var(--brand-primary);
    }

    .sticky-bar__btn--primary:hover {
      box-shadow: 0 4px 20px var(--brand-secondary-glow);
    }

    .sticky-bar__btn--secondary {
      background: var(--surface-card);
      color: var(--brand-on-primary);
      border: 1.5px solid var(--surface-card-border);
    }

    .sticky-bar__btn--secondary:hover {
      background: var(--surface-card-hover);
    }

    .sticky-bar__btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* Hide sticky bar on large screens — they have enough space */
    @media (min-width: 768px) {
      #sticky-bar {
        display: none;
      }

      #site-footer {
        padding-bottom: var(--space-md);
      }
    }

    /* =========================================================
       Responsive — Tablet 768px+
       ========================================================= */
    @media (min-width: 768px) {
      #hero-title {
        font-size: 3.25rem;
      }

      .hero__logo {
        width: 120px;
        height: 120px;
      }

      .section__title {
        font-size: 2.25rem;
      }

      .mission-grid {
        grid-template-columns: 1fr 1fr;
      }

      .contact-grid {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      }

      .footer__inner {
        flex-direction: row;
        justify-content: space-between;
      }

      #scroll-dots {
        right: 28px;
      }

      .header__logo {
        width: 40px;
        height: 40px;
      }

      .header__station-name {
        font-size: 1.125rem;
      }
    }

    /* =========================================================
       Responsive — Desktop 1280px+
       ========================================================= */
    @media (min-width: 1280px) {
      #hero-title {
        font-size: 4rem;
      }

      .section__title {
        font-size: 2.5rem;
      }
    }

    /* =========================================================
       iOS Safari — background-attachment: fixed non supporté
       ========================================================= */
    @supports (-webkit-touch-callout: none) {
      body {
        background-attachment: scroll;
      }
    }

    /* =========================================================
       Accessibilité — respecter prefers-reduced-motion
       ========================================================= */
    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-snap-type: none;
      }

      .reveal {
        opacity: 1;
        transform: none;
        transition: none;
      }

      #hero {
        animation: none;
        background: var(--brand-primary);
      }

      .listen__cta-wrap::before,
      .listen__cta-wrap::after {
        animation: none;
      }

      .eq-bar {
        animation: none;
        transform: scaleY(0.6);
      }

      .live-dot {
        animation: none;
      }

      .listen__btn,
      .store-badge,
      .mission-card,
      .contact-card,
      #lang-toggle,
      .sticky-bar__btn {
        transition: none;
      }
    }

    /* =========================================================
       Transition i18n — crossfade
       ========================================================= */
    [data-i18n] {
      transition: opacity var(--transition-base);
    }

    body.lang-switching [data-i18n] {
      opacity: 0;
    }
  </style>
</head>

<body>

  <!-- Skip to content — WCAG 2.4.1 niveau A -->
  <a href="#main-content" class="skip-link" data-i18n="skipLinkLabel">Passer au contenu principal</a>

  <!-- ============================================================
       HEADER — fixed, glassmorphism, logo + nom + toggle Fr/En
       ============================================================ -->
  <header id="site-header">
    <div class="container header__inner">
      <div class="header__brand">
        <img
          id="site-logo-header"
          class="header__logo"
          alt="Logo Radio Vox Ecclesiae"
          width="40"
          height="40"

        <span class="header__station-name">Radio Vox Ecclesiae</span>
      </div>

      <button
        id="lang-toggle"
        title="Changer de langue / Switch language"
      >EN</button>
    </div>
  </header>

  <!-- ============================================================
       SCROLL PROGRESS DOTS — right side navigation
       ============================================================ -->
  <nav id="scroll-dots" aria-label="Navigation par sections">
    <!-- Dots injected by JS from section list -->
  </nav>

  <!-- ============================================================
       MAIN
       ============================================================ -->
  <main id="main-content">

    <!-- ===================================================
         SECTION 1 — Hero
         =================================================== -->
    <section id="hero" class="snap-section" aria-labelledby="hero-title">
      <div class="container text-center">

        <span class="hero__eyebrow reveal" data-i18n="heroEyebrow"></span>

        <h1 id="hero-title" class="reveal reveal-delay-1" data-i18n="heroSlogan"></h1>

        <p class="hero__diocese reveal reveal-delay-2" data-i18n="heroDiocese"></p>

        <div
          id="hero-frequencies"
          class="hero__frequencies reveal reveal-delay-3"
          aria-label="Fréquences FM"
          data-i18n-aria="frequenciesLabel"
        >
          <!-- Badges injectés dynamiquement depuis CONFIG.station.frequencies -->
        </div>

      </div>
    </section>

    <!-- ===================================================
         SECTION 2 — Listen on Web
         =================================================== -->
    <section id="listen" class="snap-section" aria-labelledby="listen-title">
      <div class="container text-center">

        <!-- LIVE indicator -->
        <div class="live-badge reveal">
          <span class="live-dot" aria-hidden="true"></span>
          LIVE
        </div>

        <!-- CSS Equalizer -->
        <div class="equalizer reveal reveal-delay-1" aria-hidden="true">
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
        </div>

        <h2 id="listen-title" class="section__title reveal reveal-delay-1" data-i18n="listenTitle"></h2>

        <p class="section__desc reveal reveal-delay-2" data-i18n="listenDescription"></p>

        <div class="listen__cta-wrap reveal reveal-delay-3">

            target="_blank"
            rel="noopener noreferrer"
            data-i18n-aria="listenBtnLabel"

            <!-- Icône play -->
            <svg class="listen__btn-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M8 5v14l11-7z"/>
            </svg>
            <span data-i18n="listenCta"></span>
          </a>
        </div>

      </div>
    </section>

    <!-- ===================================================
         SECTION 3 — Download App
         =================================================== -->
    <section id="download" class="snap-section" aria-labelledby="download-title">
      <div class="container text-center">

        <p class="section__desc reveal reveal-delay-1" data-i18n="downloadDescription"></p>

        <div class="download__badges reveal reveal-delay-2">

          <!-- App Store -->
          <a
            id="appstore-btn"
            class="store-badge"
            href=""
            target="_blank"
            rel="noopener noreferrer"
            data-i18n-aria="downloadAppStoreLabel"
          >
            <!-- Apple logo SVG inline -->
            <svg class="store-badge__icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
            </svg>
            <div class="store-badge__text">
              <span class="store-badge__label" data-i18n="downloadOnLabel"></span>
              <span class="store-badge__name">App Store</span>
            </div>
          </a>

          <!-- Play Store -->
          <a
            id="playstore-btn"
            class="store-badge"
            href=""
            target="_blank"
            rel="noopener noreferrer"
            data-i18n-aria="downloadPlayStoreLabel"

            <svg class="store-badge__icon" viewBox="0 0 27.23 32" aria-hidden="true" focusable="false">

              <path d="m27.11 12.89-6.53-3.74-7.35 6.45 7.38 7.28 6.48-3.7a3.55 3.55 0 0 0 0-6.29z" fill="#FBBC04"/>
              <path d="M.12 2.66a3.46 3.46 0 0 0-.12.92v24.84a3.66 3.66 0 0 0 .12.92L14 15.64Z" fill="#4285F4"/>

            </svg>
            <div class="store-badge__text">
              <span class="store-badge__label" data-i18n="downloadGetOnLabel"></span>
              <span class="store-badge__name">Google Play</span>
            </div>
          </a>

        </div>
      </div>
    </section>

    <!-- ===================================================
         SECTION 4 — About
         =================================================== -->
    <section id="about" class="snap-section" aria-labelledby="about-title">

        <h2 id="about-title" class="section__title reveal" data-i18n="aboutTitle"></h2>

        <p class="section__desc reveal reveal-delay-1" data-i18n="aboutDescription"></p>

        <div class="mission-grid">

          <!-- Mission card 1 — Évangélisation -->

        </div>
      </div>

    <!-- ===================================================
         SECTION 5 — Contact
         =================================================== -->

        <div class="contact-grid">

            id="contact-whatsapp"
            class="contact-card contact-card--link reveal reveal-delay-1"

            <div class="contact-card__icon contact-card__icon--whatsapp" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">

              <svg viewBox="0 0 24 24" focusable="false">

        </div>
      </div>
    </section>

  </main>

  <!-- ============================================================
       FOOTER
       ============================================================ -->
  <footer id="site-footer">
    <div class="container footer__inner">
      <p class="footer__copyright">

      <nav class="footer__links" aria-label="Liens légaux">

          id="footer-privacy-link"
          class="footer__link"
          href="./privacy.html"
          data-i18n="footerPrivacy"
        ></a>
        <a
          id="footer-terms-link"
          class="footer__link"
          href="./terms.html"
          data-i18n="footerTerms"
        ></a>
      </nav>
    </div>

  <!-- ============================================================
       STICKY BOTTOM BAR — mobile CTA (hidden on desktop via CSS)
       ============================================================ -->
  <div id="sticky-bar" role="complementary" aria-label="Actions rapides">
    <!-- Bouton Nous soutenir -->
    <a
      id="sticky-support-btn"
      class="sticky-bar__btn sticky-bar__btn--primary"
      href="./support.html"
    >
      <!-- Heart icon -->
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </svg>
      <span data-i18n="supportCta"></span>
    </a>

    /* ===========================================================

    var currentLang = 'fr';

    /* ===========================================================
       Logging conditionnel — production-safe
       =========================================================== */
    var IS_DEV = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
    function devWarn() { if (IS_DEV) console.warn.apply(console, arguments); }
    function devError() { if (IS_DEV) console.error.apply(console, arguments); }

    /* ===========================================================
       applyLang(lang) — Logique pure, synchrone, sans animation.
       =========================================================== */
    function applyLang(lang) {
      if (!CONFIG.i18n[lang]) {
        devError('[i18n] Langue non supportée :', lang);
        return;
      }

      currentLang = lang;
      document.documentElement.setAttribute('lang', lang);

      var strings = CONFIG.i18n[lang];

      document.querySelectorAll('[data-i18n]').forEach(function (el) {
        var key = el.getAttribute('data-i18n');
        if (Object.prototype.hasOwnProperty.call(strings, key)) {
          el.textContent = strings[key];
        } else {
          devWarn('[i18n] Clé manquante :', key, 'pour la langue :', lang);
        }
      });

      document.querySelectorAll('[data-i18n-aria]').forEach(function (el) {
        var key = el.getAttribute('data-i18n-aria');
        if (Object.prototype.hasOwnProperty.call(strings, key)) {
          el.setAttribute('aria-label', strings[key]);
        }
      });

      var yearEl = document.getElementById('footer-year');
      if (yearEl) yearEl.textContent = new Date().getFullYear();

      var toggleBtn = document.getElementById('lang-toggle');
      if (toggleBtn) {
        toggleBtn.textContent = strings.langToggleText;
        toggleBtn.setAttribute('aria-label', strings.langToggleLabel);
      }
    }

    /* ===========================================================
       setLang(lang) — Switch utilisateur avec crossfade animé.
       =========================================================== */
    function setLang(lang) {
      if (!CONFIG.i18n[lang]) return;

      document.body.classList.add('lang-switching');

      setTimeout(function () {
        applyLang(lang);
        document.body.classList.remove('lang-switching');
      }, 150);
    }

    /* ===========================================================
       detectDevice — iOS → App Store, Android → Play Store
       =========================================================== */
    function detectDevice() {
      var ua = navigator.userAgent || '';
      if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) return 'ios';
      if (/android/i.test(ua)) return 'android';
      return 'other';
    }

    /* ===========================================================
       initLogos — Injecter les logos depuis CONFIG
       =========================================================== */
    function initLogos() {
      var headerLogo = document.getElementById('site-logo-header');
      if (!headerLogo) return;
      headerLogo.src = CONFIG.station.logoUrl;
      headerLogo.addEventListener('error', function () {
        this.style.display = 'none';
        devError('[logo] Échec du chargement :', this.src);
      });
    }

       initFrequencyBadges — Badges FM depuis CONFIG
       =========================================================== */

      var container = document.getElementById('hero-frequencies');

        var badge = document.createElement('span');
        badge.className = 'frequency-badge';
        badge.textContent = freq + ' FM';
        container.appendChild(badge);
      });
    }

    /* ===========================================================
       initScrollDots — Progress dots + IntersectionObserver
       =========================================================== */
    function initScrollDots() {
      var sections = Array.from(document.querySelectorAll('.snap-section'));
      var dotsNav = document.getElementById('scroll-dots');
      if (!dotsNav || sections.length === 0) return;

      var sectionIds = ['hero', 'listen', 'download', 'about', 'contact'];
      var sectionLabels = {
        hero: 'Hero',
        listen: 'Écouter',
        download: 'Télécharger',
        about: 'À propos',
        contact: 'Contact',
      };

      // Create one dot per section
      var dots = sections.map(function (section, i) {
        var id = sectionIds[i] || ('section-' + i);
        var btn = document.createElement('button');
        btn.className = 'scroll-dot';
        btn.setAttribute('aria-label', 'Aller à : ' + (sectionLabels[id] || id));
        btn.setAttribute('data-target', id);
        btn.addEventListener('click', function () {
          var target = document.getElementById(id);
          if (target) target.scrollIntoView({ behavior: 'smooth' });
        });
        dotsNav.appendChild(btn);
        return btn;
      });

      // IntersectionObserver — mark active dot + trigger .reveal animations
      var revealObserver = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          // Reveal animation on scroll into view
          if (entry.isIntersecting) {
            entry.target.querySelectorAll('.reveal').forEach(function (el) {
              el.classList.add('visible');
            });
          }
        });
      }, { threshold: 0.15 });

      var dotObserver = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (!entry.isIntersecting) return;
          var activeId = entry.target.id;
          dots.forEach(function (dot) {
            var isActive = dot.getAttribute('data-target') === activeId;
            dot.classList.toggle('active', isActive);
          });
        });
      }, { threshold: 0.5 });

      sections.forEach(function (section) {
        revealObserver.observe(section);
        dotObserver.observe(section);
      });

      // Activate first dot immediately
      if (dots[0]) dots[0].classList.add('active');
    }

    /* ===========================================================
       Gestionnaire d'événements — lang toggle
       =========================================================== */
    var langToggleBtn = document.getElementById('lang-toggle');
    if (langToggleBtn) {
      langToggleBtn.addEventListener('click', function () {
        setLang(currentLang === 'fr' ? 'en' : 'fr');
